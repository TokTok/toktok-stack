language: cpp
compiler: clang
dist: trusty
sudo: required

addons:
  apt:
    packages:
    - yasm

before_install:
- wget https://github.com/bazelbuild/bazel/releases/download/0.9.0/bazel_0.9.0-linux-x86_64.deb
- sha256sum -c tools/bazel_0.9.0-linux-x86_64.deb.sha256
- sudo dpkg -i bazel_0.9.0-linux-x86_64.deb

install:
- echo "build -j 4 --curses=no --verbose_failures" >> $HOME/.bazelrc
- echo "test -j 1 --curses=no --verbose_failures" >> $HOME/.bazelrc

script:
- bazel build //c-toxcore/...
- travis_retry bazel test //c-toxcore/... || true

git:
  depth: 1
  submodules_depth: 1
